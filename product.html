<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Abayologs</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .filter-bar {
            background: var(--bg-card);
            padding: 1rem 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .search-box input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            width: 250px;
        }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle"><button id="theme-switch" class="theme-btn"><i class="fas fa-moon"></i></button></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><h1>Abayologs</h1><span class="logo-badge">Premium</span></div>
            <div class="nav-menu">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Products</a>
                <a href="index.html#contact">Contact</a>
                <a href="admin/login.html" class="admin-link"><i class="fas fa-lock"></i> Admin</a>
            </div>
            <div class="nav-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <section style="padding-top: 100px;">
        <div class="container">
            <div class="section-header">
                <h2>All Products</h2>
                <p>Browse our complete collection of premium digital goods</p>
            </div>
            
            <div class="filter-bar">
                <div class="filter-buttons" id="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="voip">VoIP</button>
                    <button class="filter-btn" data-filter="vpn">VPN</button>
                    <button class="filter-btn" data-filter="social">Social Media</button>
                    <button class="filter-btn" data-filter="numbers">Numbers</button>
                    <button class="filter-btn" data-filter="streaming">Streaming</button>
                    <button class="filter-btn" data-filter="services">Services</button>
                    <button class="filter-btn" data-filter="other">Other</button>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search products...">
                </div>
            </div>
            
            <div class="products-grid" id="all-products">
                <!-- Products will load here -->
            </div>
        </div>
    </section>

    <a href="https://wa.me/2341234567890" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span class="tooltip">Chat with us</span>
    </a>

    <script src="js/app.js"></script>
    <script>
        // Setup filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                currentFilter = filter;
                updateProductDisplay();
            });
        });
        
        // Initial load
        renderProducts(products, 'all-products');
    </script>
</body>
</html>
