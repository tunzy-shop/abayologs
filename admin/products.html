<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Abayologs</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-wrapper { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 2rem 1rem; position: fixed; height: 100vh; overflow-y: auto; }
        .admin-main { flex: 1; margin-left: 260px; padding: 2rem; }
        .form-card { background: var(--bg-card); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid var(--border); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); }
        .image-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 0.5rem; }
        @media (max-width: 768px) { .admin-main { margin-left: 0; } .admin-sidebar { transform: translateX(-100%); } .admin-sidebar.open { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <div style="text-align: center; margin-bottom: 2rem;"><h2 style="color: var(--primary);">Abayologs</h2><p style="font-size: 0.75rem;">Admin Panel</p></div>
            <nav>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html" class="active"><i class="fas fa-box"></i> Products</a>
                <a href="inventory.html"><i class="fas fa-database"></i> Inventory</a>
                <a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>
        <div class="admin-main">
            <h1>Manage Products</h1>
            
            <div class="form-card">
                <h3>Add New Product</h3>
                <form id="add-product-form" enctype="multipart/form-data">
                    <div class="form-group"><label>Product Name</label><input type="text" id="product-name" required></div>
                    <div class="form-group"><label>Price (₦)</label><input type="text" id="product-price" required></div>
                    <div class="form-group"><label>Category</label><select id="product-category"><option value="voip">VoIP</option><option value="vpn">VPN</option><option value="social">Social Media</option><option value="numbers">Numbers</option><option value="streaming">Streaming</option><option value="services">Services</option><option value="other">Other</option></select></div>
                    <div class="form-group"><label>Description</label><textarea id="product-description" rows="3"></textarea></div>
                    <div class="form-group"><label>Product Image</label><input type="file" id="product-image" accept="image/*"><img class="image-preview" id="image-preview" style="display: none;"></div>
                    <button type="submit" class="btn-primary">Add Product</button>
                </form>
            </div>
            
            <div class="form-card">
                <h3>All Products</h3>
                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr></thead>
                        <tbody id="products-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('product-image').addEventListener('change', function(e) {
            const preview = document.getElementById('image-preview');
            if (e.target.files[0]) {
                preview.src = URL.createObjectURL(e.target.files[0]);
                preview.style.display = 'block';
            }
        });
    </script>
</body>
</html>
