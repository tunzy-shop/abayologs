<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Abayologs</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-wrapper { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 2rem 1rem; position: fixed; height: 100vh; overflow-y: auto; }
        .admin-main { flex: 1; margin-left: 260px; padding: 2rem; }
        @media (max-width: 768px) { .admin-main { margin-left: 0; } .admin-sidebar { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <div style="text-align: center; margin-bottom: 2rem;"><h2 style="color: var(--primary);">Abayologs</h2><p style="font-size: 0.75rem;">Admin Panel</p></div>
            <nav>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html"><i class="fas fa-box"></i> Products</a>
                <a href="inventory.html"><i class="fas fa-database"></i> Inventory</a>
                <a href="orders.html" class="active"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>
        <div class="admin-main">
            <h1>Orders</h1>
            <div class="form-card">
                <p>Orders will appear here once payment system is integrated.</p>
                <p>Currently, customers are directed to WhatsApp for purchases.</p>
                <table class="admin-table" style="margin-top: 1rem;">
                    <thead><tr><th>Order ID</th><th>Customer</th><th>Product</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="orders-table-body"><tr><td colspan="6" style="text-align: center;">No orders yet</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
