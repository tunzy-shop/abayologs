<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Order Delivered · Abayologs</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="nav-mount"></div>
<section class="container">
  <div class="glass" style="padding:32px;text-align:center;max-width:640px;margin:0 auto" id="card">
    <div style="font-size:3rem">🎉</div>
    <h2 class="section-title" style="margin-top:8px">Payment Successful!</h2>
    <p style="color:var(--muted)">Your credentials are ready below.</p>
    <div class="success-box" id="creds" style="margin-top:18px;text-align:left"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">
      <button class="btn btn-primary" id="copyBtn" title="Copy to clipboard">📋 Copy Details</button>
      <button class="btn btn-ghost" id="dlBtn">⬇ Download as Text</button>
    </div>
    <div class="warn" style="margin-top:18px">⚠️ Change your password immediately after first login.</div>
    <a href="index.html" class="btn btn-ghost" style="margin-top:18px">← Back to Home</a>
  </div>
</section>
<div id="footer-mount"></div>
<script src="app.js"></script>
<script>
Abayologs.mountChrome('home');
const id=new URLSearchParams(location.search).get('id');
const order=Abayologs.Store.orders.find(o=>o.id===id);
document.getElementById('creds').textContent = order?.credentials || 'No credentials found for this order.';
document.getElementById('copyBtn').onclick=()=>{navigator.clipboard.writeText(order?.credentials||'');Abayologs.toast('Copied!');};
document.getElementById('dlBtn').onclick=()=>{
  const blob=new Blob([order?.credentials||''],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${id}.txt`;a.click();
};
// confetti
(function(){
  const colors=['#10b981','#22c55e','#34d399','#fbbf24','#60a5fa'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=colors[i%colors.length];
    c.style.animation=`fall ${2+Math.random()*2}s ${Math.random()}s linear forwards`;
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
  }
  const s=document.createElement('style');s.textContent='@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}';document.head.appendChild(s);
})();
</script>
</body>
</html>
