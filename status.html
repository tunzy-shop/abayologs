<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Order Status · Abayologs</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="nav-mount"></div>
<section class="container">
  <h2 class="section-title">Check Order Status</h2>
  <div class="glass" style="padding:24px;max-width:520px">
    <form class="form" id="lookup">
      <div><label>Order ID or Email</label><input required name="q" placeholder="AB-2024-001 or you@mail.com"/></div>
      <button class="btn btn-primary" type="submit">Check Status</button>
    </form>
  </div>
  <div id="result" style="margin-top:20px"></div>
</section>
<div id="footer-mount"></div>
<script src="app.js"></script>
<script>
Abayologs.mountChrome('status');
document.getElementById('lookup').addEventListener('submit',e=>{
  e.preventDefault();
  const q=new FormData(e.target).get('q').toString().trim().toLowerCase();
  const matches=Abayologs.Store.orders.filter(o=>o.id.toLowerCase()===q||o.customer.email.toLowerCase()===q);
  const out=document.getElementById('result');
  if(!matches.length){out.innerHTML=`<div class="glass" style="padding:18px">No orders found.</div>`;return;}
  out.innerHTML = matches.map(o=>`
    <div class="glass" style="padding:20px;margin-bottom:14px">
      <div class="kv"><span>Order ID</span><span>${o.id}</span></div>
      <div class="kv"><span>Product</span><span>${o.product}</span></div>
      <div class="kv"><span>Amount</span><span>${Abayologs.ngn(o.amount)}</span></div>
      <div class="kv"><span>Payment</span><span><span class="pill ${o.status==='Pending'?'pending':'paid'}">${o.status==='Pending'?'Pending':'Paid'}</span></span></div>
      <div class="kv"><span>Delivery</span><span>${o.credentials?'<span class="pill delivered">Delivered</span>':'<span class="pill pending">Awaiting</span>'}</span></div>
      ${o.credentials?`<div class="success-box" style="margin-top:12px">${o.credentials}</div>`:''}
    </div>`).join('');
});
</script>
</body>
</html>
